<html>

<head>
	<title>Tapsırıq</title>
</head>

<body>


    <table>

        <tr>
            <th>Name</th>
            <th>Surname</th>
            <th>Grade</th>
        </tr>

        <tr th:each="s : ${students}">
            <td th:text="${s.name}"></td>
            <td th:text="${s.surname}"></td>
            <td th:text="${s.grade}"></td>
        </tr>

    </table>

</body>
</html>
